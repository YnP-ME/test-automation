name: UI Test Automation - DEV

on:
  workflow_call:
    inputs:
      requirements_path:
        required: true
        type: string
      tests_path:
        required: true
        type: string
      environment:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'development'
        type: choice
        options: [ development ]

  pull_request:
    branches: [main, dev ]

  push:
    branches: [main,dev ]

  schedule:
    - cron: '0 0 * * *'

jobs:
  autotest:
    name: Run Python UI Tests (DEV)
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write

    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ADMIN_USERNAME: ${{ vars.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ vars.ADMIN_PASSWORD }}
      EMPLOYEE_USERNAME: ${{ vars.EMPLOYEE_USERNAME }}
      EMPLOYEE_PASSWORD: ${{ vars.EMPLOYEE_PASSWORD }}
      EMPLOYEE_NEW_PASSWORD: ${{ vars.EMPLOYEE_NEW_PASSWORD }}

    steps:
      - name: Checkout TestAutomation repo
        uses: actions/checkout@v4
        with:
          repository: YnP-ME/test-automation
          path: test-automation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r test-automation/${{ inputs.requirements_path || 'dream_platform/requirements.txt' }}

      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Install Azure CLI
        run: curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          curl -L https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz -o allure.tgz
          tar -xzf allure.tgz
          sudo mv allure-${ALLURE_VERSION} /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/bin/allure

      - name: Login to Azure
        run: |
          az login --service-principal \
            -u "$AZURE_CLIENT_ID" \
            -p "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID"

      # ----------------- Allure history logic -----------------

      - name: Prepare gh-pages folder
        run: |
          if [ ! -d gh-pages ]; then
            git clone --depth 1 --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/YnP-ME/test-automation.git gh-pages || mkdir gh-pages
          fi

      - name: Run pytest
        run: |
          cd test-automation
          pytest ${{ inputs.tests_path || 'dream_platform/ui/tests' }} \
            --env=${{ inputs.environment || 'development' }} \
            --junitxml=pytest-report.xml \
            --alluredir=allure-results || true

      - name: Restore previous Allure history
        run: |
          if [ -d gh-pages/allure-report/history ]; then
            mkdir -p test-automation/allure-results/history
            cp -r gh-pages/allure-report/history/* test-automation/allure-results/history/
            if [ -f test-automation/allure-results/history/executor.json ]; then
              rm test-automation/allure-results/history/executor.json
            fi
            echo "History restored without old executor.json"
          else
            echo "No previous history found"
          fi

      - name: Create Allure executor info
        run: |
          mkdir -p test-automation/allure-results
          cat > test-automation/allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions DEV",
            "type": "github",
            "buildName": "Run #${{ github.run_number }}",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure-report/",
            "buildOrder": "${{ github.run_number }}"
          }
          EOF

      - name: Add environment info to Allure
        run: |
          mkdir -p test-automation/allure-results
          echo "Environment=${{ inputs.environment || 'development' }}" > test-automation/allure-results/environment.properties

      - name: Generate Allure report
        run: |
          cd test-automation
          allure generate allure-results --clean -o allure-report

      - name: Parse test results and create artifact
        if: always()
        run: |
          cd test-automation
          if [ -f pytest-report.xml ]; then
            TOTAL=$(python3 -c "import xml.etree.ElementTree as ET; tree = ET.parse('pytest-report.xml'); print(tree.getroot().attrib.get('tests', '0'))")
            FAILURES=$(python3 -c "import xml.etree.ElementTree as ET; tree = ET.parse('pytest-report.xml'); print(tree.getroot().attrib.get('failures', '0'))")
            ERRORS=$(python3 -c "import xml.etree.ElementTree as ET; tree = ET.parse('pytest-report.xml'); print(tree.getroot().attrib.get('errors', '0'))")
            PASSED=$((TOTAL - FAILURES - ERRORS))
            FAILED=$((FAILURES + ERRORS))
          else
            TOTAL=0
            PASSED=0
            FAILED=0
          fi

          cat > test-results.json <<EOF
          {
            "total_tests": $TOTAL,
            "passed_tests": $PASSED,
            "failed_tests": $FAILED,
            "allure_url": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure-report/"
          }
          EOF

      - name: Upload test results as artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: test-automation/test-results.json
          retention-days: 7

      - name: Archive Allure report by run number
        run: |
          mkdir -p gh-pages/run-${GITHUB_RUN_NUMBER}
          cp -r test-automation/allure-report gh-pages/run-${GITHUB_RUN_NUMBER}/allure-report

          rm -rf gh-pages/allure-report
          cp -r test-automation/allure-report gh-pages/allure-report

      - name: Commit updated Allure history
        run: |
          cd gh-pages
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Add Allure report for Run #${GITHUB_RUN_NUMBER}" || echo "No changes to commit"
          git push origin gh-pages

      - name: Upload Allure report artifact
        uses: actions/upload-pages-artifact@v4
        with:
          name: github-pages
          path: gh-pages/allure-report

  deploy-allure:
    needs: autotest
    if: always()
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment: github-pages

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Add Allure report link to workflow summary
        run: |
          echo "### Allure Report (DEV)" >> $GITHUB_STEP_SUMMARY
          echo "[Click here to view Allure report](https://ynp-me.github.io/test-automation/)" >> $GITHUB_STEP_SUMMARY
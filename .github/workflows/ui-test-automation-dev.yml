name: UI Test Automation - DEV

on:
  workflow_call:
    inputs:
      requirements_path:
        required: true
        type: string
      tests_path:
        required: true
        type: string
      environment:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      environment:
        description: Environment to test
        required: true
        default: development
        type: choice
        options:
          - development

  pull_request:
    branches: [main, dev]

  push:
    branches: [main, dev]

  schedule:
    - cron: '0 0 * * *'

jobs:
  autotest:
    name: Run Python UI Tests (DEV)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ADMIN_USERNAME: ${{ vars.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ vars.ADMIN_PASSWORD }}
      EMPLOYEE_USERNAME: ${{ vars.EMPLOYEE_USERNAME }}
      EMPLOYEE_PASSWORD: ${{ vars.EMPLOYEE_PASSWORD }}
      EMPLOYEE_NEW_PASSWORD: ${{ vars.EMPLOYEE_NEW_PASSWORD }}

    steps:
      - name: Checkout TestAutomation repo
        uses: actions/checkout@v4
        with:
          repository: YnP-ME/test-automation
          path: test-automation

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: test-automation/${{ inputs.requirements_path || 'dream_platform/requirements.txt' }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r test-automation/${{ inputs.requirements_path || 'dream_platform/requirements.txt' }}

      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Install Azure CLI
        run: curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          curl -L https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz -o allure.tgz
          tar -xzf allure.tgz
          sudo mv allure-${ALLURE_VERSION} /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/bin/allure

      - name: Login to Azure
        run: |
          az login --service-principal \
            -u "$AZURE_CLIENT_ID" \
            -p "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID"

      - name: Restore Allure history cache
        uses: actions/cache/restore@v4
        with:
          path: .allure-history-cache
          key: allure-history-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            allure-history-${{ github.repository }}-${{ github.ref_name }}-
            allure-history-${{ github.repository }}-

      - name: Restore previous Allure history
        run: |
          if [ -d .allure-history-cache/history ]; then
            mkdir -p test-automation/allure-results/history
            cp -R .allure-history-cache/history/. test-automation/allure-results/history/
            rm -f test-automation/allure-results/history/executor.json
            echo "History restored from cache"
          else
            echo "No cached history found"
          fi

      - name: Run pytest
        run: |
          cd test-automation
          pytest ${{ inputs.tests_path || 'dream_platform/ui/tests' }} \
            --env=${{ inputs.environment || 'development' }} \
            --junitxml=pytest-report.xml \
            --alluredir=allure-results || true

      - name: Create Allure executor info
        run: |
          mkdir -p test-automation/allure-results
          cat > test-automation/allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions DEV",
            "type": "github",
            "buildName": "Run #${{ github.run_number }}",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/",
            "buildOrder": "${{ github.run_number }}"
          }
          EOF

      - name: Add environment info to Allure
        run: |
          mkdir -p test-automation/allure-results
          echo "Environment=${{ inputs.environment || 'development' }}" > test-automation/allure-results/environment.properties

      - name: Generate Allure report
        run: |
          cd test-automation
          allure generate allure-results --clean -o allure-report

      - name: Prepare history for next run
        if: always()
        run: |
          rm -rf .allure-history-cache
          mkdir -p .allure-history-cache
          if [ -d test-automation/allure-report/history ]; then
            cp -R test-automation/allure-report/history .allure-history-cache/history
            echo "Prepared history cache for next run"
          else
            echo "No generated history to save"
          fi

      - name: Save Allure history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .allure-history-cache
          key: allure-history-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Parse test results and create artifact
        if: always()
        run: |
          cd test-automation
          if [ -f pytest-report.xml ]; then
            TOTAL=$(python3 -c "import xml.etree.ElementTree as ET; tree = ET.parse('pytest-report.xml'); print(tree.getroot().attrib.get('tests', '0'))")
            FAILURES=$(python3 -c "import xml.etree.ElementTree as ET; tree = ET.parse('pytest-report.xml'); print(tree.getroot().attrib.get('failures', '0'))")
            ERRORS=$(python3 -c "import xml.etree.ElementTree as ET; tree = ET.parse('pytest-report.xml'); print(tree.getroot().attrib.get('errors', '0'))")
            PASSED=$((TOTAL - FAILURES - ERRORS))
            FAILED=$((FAILURES + ERRORS))
          else
            TOTAL=0
            PASSED=0
            FAILED=0
          fi

          cat > test-results.json <<EOF
          {
            "total_tests": $TOTAL,
            "passed_tests": $PASSED,
            "failed_tests": $FAILED,
            "allure_url": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          }
          EOF

      - name: Upload test results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-automation/test-results.json
          retention-days: 7

      - name: Upload Allure report artifact for Pages
        if: always()
        uses: actions/upload-pages-artifact@v4
        with:
          path: test-automation/allure-report

  deploy-allure:
    name: Deploy Allure to GitHub Pages
    needs: autotest
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Add Allure report link to workflow summary
        run: |
          echo "### Allure Report (DEV)" >> "$GITHUB_STEP_SUMMARY"
          echo "[Click here to view Allure report](${{ steps.deployment.outputs.page_url }})" >> "$GITHUB_STEP_SUMMARY"